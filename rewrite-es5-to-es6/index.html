<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ES6 Modernization</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Rewrite ES5 TO ES6</h1>
      <p class="subtitle">Open the browser console to see all outputs.</p>

      <div class="card">
        <h2>Step 2 — let & const</h2>
        <div id="output-variables" class="output-box"></div>
      </div>

      <div class="card">
        <h2>Step 3 — Arrow Functions</h2>
        <div id="output-arrows" class="output-box"></div>
      </div>

      <div class="card">
        <h2>Step 4 — Template Literals</h2>
        <div id="output-templates" class="output-box"></div>
      </div>

      <div class="card">
        <h2>Step 5 — Destructuring</h2>
        <div id="output-destructuring" class="output-box"></div>
      </div>

      <div class="card">
        <h2>Step 5 — Spread Operator</h2>
        <div id="output-spread" class="output-box"></div>
      </div>

      <div class="card">
        <h2>Step 5 — Default Parameters</h2>
        <div id="output-defaults" class="output-box"></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
